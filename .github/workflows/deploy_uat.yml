name: UAT Build and Deploy Check Usage CronJob

on:
  push:
    branches:
      - vcn
  workflow_dispatch:
    inputs:
      branch:
        description: '选择要构建的分支'
        required: true
        default: 'vcn'
        type: choice
        options:
          - vcn

env:
  IMAGE_NAME: appliance-solution-server/token-usage   # ACR 中的镜像名（不含仓库地址）

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码（支持手动输入分支）
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      # 2. 登录阿里云 ACR
      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ALICLOUD_ACR_REPO }}
          username: ${{ secrets.ALICLOUD_ACR_USER }}
          password: ${{ secrets.ALICLOUD_ACR_PASSWORD }}
        # 如果secrets缺失，action会自动失败，无需额外检查

      # 3. 生成镜像标签（使用短 commit SHA）
      - name: Set image tag
        id: image_tag
        run: |
          TAG=$(git rev-parse --short=6 HEAD)
          echo "TAG=$TAG" >> $GITHUB_ENV

      # 4. 构建 Docker 镜像（使用项目根目录的 Dockerfile）
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ALICLOUD_ACR_REPO }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .
          docker tag ${{ secrets.ALICLOUD_ACR_REPO }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} \
                     ${{ secrets.ALICLOUD_ACR_REPO }}/${{ env.IMAGE_NAME }}:latest

      # 5. 推送镜像到 ACR
      - name: Push Docker images
        run: |
          docker push ${{ secrets.ALICLOUD_ACR_REPO }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}
          docker push ${{ secrets.ALICLOUD_ACR_REPO }}/${{ env.IMAGE_NAME }}:latest
